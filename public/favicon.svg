<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Metro İstanbul">
  <defs>
    <linearGradient id="mi-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#173f92" />
      <stop offset="1" stop-color="#0b2153" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#mi-bg)" />
  <!-- "M" drawn as a metro line: terminus → interchange → terminus -->
  <path d="M15 47 V21 L32 37 L49 21 V47" fill="none" stroke="#fff" stroke-width="6.2"
        stroke-linecap="round" stroke-linejoin="round" />
  <!-- terminus stations -->
  <circle cx="15" cy="21" r="4.4" fill="#fff" />
  <circle cx="49" cy="21" r="4.4" fill="#fff" />
  <!-- red interchange dot at the junction -->
  <circle cx="32" cy="37" r="5.4" fill="#e30613" stroke="#fff" stroke-width="2" />
</svg>
